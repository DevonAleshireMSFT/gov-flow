title: GovFlow
description: >-
  Government Federated Low-Code Operations Framework. Enterprise Power Platform
  governance for GCC High / DoD organizations — environment strategy, DLP
  architecture, ATO governance, and AI workload security at federal scale.

baseurl: ""
url: "https://govflowhq.com"

theme: just-the-docs

logo: "/assets/images/govflow-logo.png"

# GitHub repository link (top-right)
aux_links:
  "GitHub":
    - "https://github.com/DevonAleshireMSFT/gov-flow"
aux_links_new_tab: true

# Color scheme: "light", "dark", or custom scheme name from _sass/color_schemes/
color_scheme: govflow

# Heading anchors
heading_anchors: true

# Search
search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s\-\/]+/
  rel_url: true
  button: false
  focus_shortcut_key: "k"

# Navigation
nav_sort: order

# Callout types
callouts_level: quiet
callouts:
  note:
    title: Note
    color: blue
  warning:
    title: Warning
    color: red
  important:
    title: Important
    color: blue
  tip:
    title: Tip
    color: green

# Footer
footer_content: >-
  gov-flow &mdash; LP-ALM Enterprise Framework v1.0 &mdash; May 2026.
  Built with <a href="https://github.com/just-the-docs/just-the-docs">Just the Docs</a>.
  Built with assistance from GitHub Copilot (Claude Sonnet 4.6). All output reviewed by a human.

last_edit_timestamp: true
last_edit_time_format: "%b %e %Y"

back_to_top: true
back_to_top_text: "Back to top"

# Plugins
plugins:
  - jekyll-seo-tag
